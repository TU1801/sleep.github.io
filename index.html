<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="睡眠记录">
<title>睡眠记录</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --card: #1e1e35;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --green: #34d399;
    --amber: #fbbf24;
    --red: #f87171;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: rgba(124,106,247,0.2);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
    font-size: 15px;
    line-height: 1.5;
    overscroll-behavior: none;
  }
  .header {
    background: var(--bg2);
    padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.02em; }
  .header p { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .tabbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex; z-index: 10;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 10px 0; cursor: pointer; color: var(--text3);
    font-size: 11px; gap: 4px; transition: color 0.2s; user-select: none;
  }
  .tab.active { color: var(--accent2); }
  .tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .page { display: none; padding: 16px; animation: fadeIn 0.2s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 18px;
    margin-bottom: 14px;
  }
  .card-title { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .metric { background: var(--card); border-radius: var(--radius-sm); border: 1px solid var(--border); padding: 12px 10px; text-align: center; }
  .metric-val { font-size: 20px; font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; }
  .metric-label { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-full { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; }
  input[type="date"], input[type="time"] {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); padding: 11px 14px;
    font-size: 15px; font-family: 'DM Mono', monospace; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  input[type="date"]:focus, input[type="time"]:focus { border-color: var(--accent); }
  .preview {
    background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.3);
    border-radius: var(--radius-sm); padding: 10px 14px;
    font-size: 14px; color: var(--text2); margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .preview-dur { font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; font-size: 20px; }
  .btn-save {
    width: 100%; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); padding: 14px;
    font-size: 16px; font-weight: 500; font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer; transition: opacity 0.15s, transform 0.15s; letter-spacing: 0.02em;
  }
  .btn-save:active { opacity: 0.8; transform: scale(0.98); }
  .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
  .badge-good { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-ok   { background: rgba(251,191,36,0.15);  color: var(--amber); }
  .badge-bad  { background: rgba(248,113,113,0.15); color: var(--red); }
  .rec-item {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .rec-item:last-child { border-bottom: none; }
  .rec-date { font-size: 13px; color: var(--text3); min-width: 68px; }
  .rec-times { font-size: 12px; color: var(--text2); flex: 1; }
  .rec-dur { font-family: 'DM Mono', monospace; font-size: 16px; font-weight: 500; color: var(--accent2); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px; font-size: 16px; line-height: 1; }
  .del-btn:active { color: var(--red); }
  .week-bars { display: flex; align-items: flex-end; gap: 6px; height: 110px; margin: 14px 0 6px; }
  .bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; gap: 3px; }
  .bar { width: 100%; border-radius: 5px 5px 0 0; min-height: 4px; transition: height 0.5s cubic-bezier(.22,.68,0,1.2); }
  .bar-val { font-size: 9px; color: var(--text2); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .bar-day { font-size: 10px; color: var(--text3); }
  .w-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .w-stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .w-stat-val { font-size: 22px; font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; }
  .w-stat-label { font-size: 11px; color: var(--text3); margin-top: 2px; }
  select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); padding: 11px 14px;
    font-size: 14px; outline: none; margin-bottom: 14px;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .toast {
    position: fixed; bottom: calc(90px + env(safe-area-inset-bottom, 0px)); left: 50%;
    transform: translateX(-50%);
    background: var(--accent); color: #fff; padding: 10px 22px;
    border-radius: 30px; font-size: 14px; z-index: 100;
    opacity: 0; transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; color: var(--text3); padding: 40px 0; font-size: 14px; }
  .moon-icon { font-size: 40px; display: block; margin-bottom: 8px; }
  .install-banner {
    background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.3);
    border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .install-banner p { font-size: 13px; color: var(--text2); flex: 1; }
  .btn-install {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); padding: 8px 14px;
    font-size: 13px; font-family: 'Noto Sans SC', sans-serif; cursor: pointer; white-space: nowrap;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🌙 睡眠记录</h1>
  <p id="header-date"></p>
</div>

<!-- 记录 -->
<div class="page active" id="page-record">
  <div id="install-banner" class="install-banner" style="display:none">
    <p>添加到主屏幕，像 App 一样使用</p>
    <button class="btn-install" id="btn-install">安装</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-val" id="stat-today">—</div><div class="metric-label">今日睡眠</div></div>
    <div class="metric"><div class="metric-val" id="stat-avg">—</div><div class="metric-label">本周均值</div></div>
    <div class="metric"><div class="metric-val" id="stat-count">0</div><div class="metric-label">已记录天</div></div>
  </div>

  <div class="card">
    <div class="card-title">添加记录</div>
    <div class="form-full">
      <label class="form-label">日期</label>
      <input type="date" id="inp-date">
    </div>
    <div class="form-row">
      <div>
        <label class="form-label">🌙 入睡时间</label>
        <input type="time" id="inp-sleep">
      </div>
      <div>
        <label class="form-label">☀️ 起床时间</label>
        <input type="time" id="inp-wake">
      </div>
    </div>
    <div class="preview">
      <span class="preview-dur" id="prev-dur">—</span>
      <span id="prev-badge"></span>
      <span id="prev-tip" style="font-size:12px;color:var(--text3);margin-left:auto;"></span>
    </div>
    <button class="btn-save" onclick="saveRecord()">保存记录</button>
  </div>
</div>

<!-- 历史 -->
<div class="page" id="page-history">
  <div class="card">
    <div class="card-title">历史记录</div>
    <div id="history-list"><div class="empty-state"><span class="moon-icon">🌙</span>还没有记录</div></div>
  </div>
</div>

<!-- 周报 -->
<div class="page" id="page-weekly">
  <select id="week-sel" onchange="renderWeekly()"></select>
  <div class="w-stats" id="w-stats"></div>
  <div class="card">
    <div class="card-title">每日睡眠时长</div>
    <div class="week-bars" id="week-bars"></div>
    <div style="display:flex;justify-content:space-around;font-size:10px;color:var(--text3);margin-top:4px;">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div style="margin-top:10px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px;">
      <span style="display:inline-block;width:18px;height:2px;background:var(--green);border-radius:1px;vertical-align:middle;"></span>建议 8 小时
    </div>
  </div>
  <div class="card" id="w-detail"></div>
</div>

<!-- Tabbar -->
<div class="tabbar">
  <div class="tab active" id="tab-record" onclick="switchTab('record')">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    记录
  </div>
  <div class="tab" id="tab-history" onclick="switchTab('history')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    历史
  </div>
  <div class="tab" id="tab-weekly" onclick="switchTab('weekly')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    周报
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// PWA Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// PWA Install prompt
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').style.display = 'flex';
});
document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('install-banner').style.display = 'none';
  deferredPrompt = null;
});
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').style.display = 'none';
});

// Data
let records = JSON.parse(localStorage.getItem('slp_v1') || '[]');
const persist = () => localStorage.setItem('slp_v1', JSON.stringify(records));

// Init
const todayStr = new Date().toISOString().slice(0,10);
document.getElementById('inp-date').value = todayStr;
document.getElementById('inp-sleep').value = '23:00';
document.getElementById('inp-wake').value = '07:00';
const wd = ['周日','周一','周二','周三','周四','周五','周六'];
const nd = new Date();
document.getElementById('header-date').textContent =
  nd.getFullYear()+'年'+(nd.getMonth()+1)+'月'+nd.getDate()+'日 '+wd[nd.getDay()];

// Helpers
function calcH(date, s, w) {
  const st = new Date(date+'T'+s), wt = new Date(date+'T'+w);
  if (wt <= st) wt.setDate(wt.getDate()+1);
  return (wt - st) / 3600000;
}
function fmtH(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return hh + 'h' + (mm < 10 ? '0' : '') + mm;
}
function quality(h) {
  if (h >= 7 && h <= 9) return { cls: 'good', txt: '良好' };
  if (h >= 6 && h < 7)  return { cls: 'ok',   txt: '偏少' };
  if (h > 9)             return { cls: 'ok',   txt: '偏多' };
  return { cls: 'bad', txt: '不足' };
}
function tip(h) {
  if (h >= 7 && h <= 9) return '睡眠充足 👍';
  if (h < 6)  return '建议补充睡眠';
  if (h > 9)  return '可适当减少';
  return '接近目标';
}

// Preview
function updatePreview() {
  const date = document.getElementById('inp-date').value;
  const s = document.getElementById('inp-sleep').value;
  const w = document.getElementById('inp-wake').value;
  if (!date || !s || !w) return;
  const h = calcH(date, s, w);
  const q = quality(h);
  document.getElementById('prev-dur').textContent = fmtH(h);
  document.getElementById('prev-badge').innerHTML = `<span class="badge badge-${q.cls}">${q.txt}</span>`;
  document.getElementById('prev-tip').textContent = tip(h);
}
['inp-date','inp-sleep','inp-wake'].forEach(id =>
  document.getElementById(id).addEventListener('input', updatePreview));
updatePreview();

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Save
function saveRecord() {
  const date = document.getElementById('inp-date').value;
  const s = document.getElementById('inp-sleep').value;
  const w = document.getElementById('inp-wake').value;
  if (!date || !s || !w) { showToast('请填写完整信息'); return; }
  const h = calcH(date, s, w);
  const idx = records.findIndex(r => r.date === date);
  const rec = { date, s, w, h };
  if (idx >= 0) { records[idx] = rec; showToast('记录已更新 ✓'); }
  else { records.push(rec); showToast('保存成功 ✓'); }
  records.sort((a, b) => b.date.localeCompare(a.date));
  persist(); updateStats();
}

// Stats
function updateStats() {
  const tr = records.find(r => r.date === todayStr);
  document.getElementById('stat-today').textContent = tr ? fmtH(tr.h) : '—';
  document.getElementById('stat-count').textContent = records.length;
  const ago = new Date(); ago.setDate(ago.getDate() - 6);
  const recent = records.filter(r => new Date(r.date) >= ago);
  document.getElementById('stat-avg').textContent =
    recent.length ? fmtH(recent.reduce((a, b) => a + b.h, 0) / recent.length) : '—';
}
updateStats();

// Tabs
function switchTab(t) {
  ['record','history','weekly'].forEach(x => {
    document.getElementById('page-'+x).classList.toggle('active', x === t);
    document.getElementById('tab-'+x).classList.toggle('active', x === t);
  });
  if (t === 'history') renderHistory();
  if (t === 'weekly') { buildWeekMenu(); renderWeekly(); }
}

// History
function renderHistory() {
  const el = document.getElementById('history-list');
  if (!records.length) {
    el.innerHTML = '<div class="empty-state"><span class="moon-icon">🌙</span>还没有记录</div>';
    return;
  }
  el.innerHTML = records.map((r, i) => {
    const q = quality(r.h);
    return `<div class="rec-item">
      <div class="rec-date">${r.date.slice(5)}</div>
      <div class="rec-times">${r.s} → ${r.w}</div>
      <div class="rec-dur">${fmtH(r.h)}</div>
      <span class="badge badge-${q.cls}">${q.txt}</span>
      <button class="del-btn" onclick="delRec(${i})">✕</button>
    </div>`;
  }).join('');
}
function delRec(i) {
  if (!confirm('删除这条记录？')) return;
  records.splice(i, 1); persist(); renderHistory(); updateStats();
}

// Weekly
function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const diff = d.getDay() === 0 ? -6 : 1 - d.getDay();
  d.setDate(d.getDate() + diff);
  return d.toISOString().slice(0, 10);
}
function buildWeekMenu() {
  const weeks = [...new Set(records.map(r => getWeekStart(r.date)))].sort((a,b)=>b.localeCompare(a));
  const sel = document.getElementById('week-sel');
  if (!weeks.length) { sel.innerHTML = '<option>暂无数据</option>'; return; }
  sel.innerHTML = weeks.map(w => {
    const e = new Date(w+'T12:00:00'); e.setDate(e.getDate()+6);
    return `<option value="${w}">${w} 至 ${e.toISOString().slice(0,10)}</option>`;
  }).join('');
}
function renderWeekly() {
  const ws = document.getElementById('week-sel').value;
  if (!ws || ws === '暂无数据') {
    document.getElementById('w-stats').innerHTML = '';
    document.getElementById('week-bars').innerHTML = '';
    document.getElementById('w-detail').innerHTML =
      '<div class="empty-state"><span class="moon-icon">🌙</span>还没有记录</div>';
    return;
  }
  const we = new Date(ws+'T12:00:00'); we.setDate(we.getDate()+6);
  const weStr = we.toISOString().slice(0,10);
  const wRecs = records.filter(r => r.date >= ws && r.date <= weStr);
  const hrs = wRecs.map(r => r.h);
  const avg  = hrs.length ? hrs.reduce((a,b)=>a+b,0)/hrs.length : 0;
  const best = hrs.length ? Math.max(...hrs) : 0;
  const good = hrs.filter(h=>h>=7&&h<=9).length;

  document.getElementById('w-stats').innerHTML = `
    <div class="w-stat"><div class="w-stat-val">${wRecs.length} 天</div><div class="w-stat-label">有记录天数</div></div>
    <div class="w-stat"><div class="w-stat-val">${hrs.length?fmtH(avg):'—'}</div><div class="w-stat-label">平均睡眠</div></div>
    <div class="w-stat"><div class="w-stat-val">${hrs.length?fmtH(best):'—'}</div><div class="w-stat-label">最长睡眠</div></div>
    <div class="w-stat"><div class="w-stat-val">${good} 天</div><div class="w-stat-label">优质睡眠天数</div></div>`;

  const days7 = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws+'T12:00:00'); d.setDate(d.getDate()+i);
    days7.push({ ds: d.toISOString().slice(0,10), rec: wRecs.find(r=>r.date===d.toISOString().slice(0,10)) });
  }
  const maxH = Math.max(10, ...hrs);
  const colors = { good:'#7c6af7', ok:'#fbbf24', bad:'#f87171' };
  document.getElementById('week-bars').innerHTML = days7.map(({ds,rec}) => {
    const pct = rec ? Math.max(5, (rec.h/maxH)*100) : 5;
    const q = rec ? quality(rec.h) : null;
    const refPct = (8/maxH)*100;
    return `<div class="bar-wrap" style="position:relative;">
      ${rec ? `<div class="bar-val">${fmtH(rec.h)}</div>` : '<div class="bar-val" style="opacity:0">0h</div>'}
      <div class="bar" style="height:${pct}%;background:${rec?colors[q.cls]:'rgba(255,255,255,0.08)'}"></div>
    </div>`;
  }).join('');

  const dayNames = ['周一','周二','周三','周四','周五','周六','周日'];
  document.getElementById('w-detail').innerHTML =
    '<div class="card-title">本周明细</div>' +
    days7.map(({ds,rec},i) => {
      const q = rec ? quality(rec.h) : null;
      return `<div class="rec-item">
        <div style="min-width:28px;font-size:12px;color:var(--text3)">${dayNames[i]}</div>
        <div class="rec-date">${ds.slice(5)}</div>
        ${rec
          ? `<div class="rec-times">${rec.s}→${rec.w}</div>
             <div class="rec-dur">${fmtH(rec.h)}</div>
             <span class="badge badge-${q.cls}">${q.txt}</span>`
          : '<div style="color:var(--text3);font-size:13px;flex:1">无记录</div>'}
      </div>`;
    }).join('');
}
</script>
</body>
</html>
